version: 1.0
runtime: corretto21
build:
  commands:
    build:
      - mvn clean package
run:
  command: java -jar target/arquitetura-software-0.0.1-SNAPSHOT.jar
  network:
    port: 8080
  env:
    - name: JAVA_HOME
      value: /usr/lib/jvm/java-21-amazon-corretto
    - name: SPRING_PROFILES_ACTIVE
      value: prod